name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 1. Install workloads for Blazor
      - name: Install WASM Tools
        run: dotnet workload install wasm-tools

      # 2. Publish to a specific folder named 'output' inside the StayFocus directory
      - name: Publish App
        run: dotnet publish StayFocus/StayFocus.csproj -c Release -o StayFocus/output

      # 3. DEBUG: This will show us exactly where index.html is in the logs
      - name: List files for debugging
        run: ls -R StayFocus/output/wwwroot

      # 4. Deploy the contents of the wwwroot folder
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BUSH_0B40DCA1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # This points to the folder containing index.html
          app_location: "StayFocus/output/wwwroot" 
          
          # We leave these empty because we already built the app
          api_location: ""
          output_location: "" 
          skip_app_build: true
        env:
          SKIP_DEPLOY_ON_MISSING_SECRETS: true