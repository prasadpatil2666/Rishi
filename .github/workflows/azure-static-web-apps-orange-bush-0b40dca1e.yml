name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Step 1: We build the app ourselves so we know exactly where the files are
      - name: Publish App
        run: dotnet publish StayFocus/StayFocus.csproj -c Release -o release

      # Step 2: Upload the results
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BUSH_0B40DCA1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # Point directly to the output of the publish command
          app_location: "publish_output/wwwroot" 
          api_location: "Api"
          output_location: "" # Leave empty because we are already pointing to the folder
          
          # Tell Azure NOT to try building it again
          skip_app_build: true
        env:
          SKIP_DEPLOY_ON_MISSING_SECRETS: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BUSH_0B40DCA1E }}
          action: "close"