name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and publish Blazor WebAssembly
        run: |
          dotnet publish -c Release -o ./publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BUSH_0B40DCA1E }} # Set in the repository secrets
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Optional: used by the action for PR comments
          action: "upload"
          app_location: "/" # App source code path — root of repository
          api_location: ""   # No Azure Functions API in this repo
          app_artifact_location: "publish/wwwroot" # Built app location generated by `dotnet publish`
